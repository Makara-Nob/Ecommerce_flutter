name: e_commerce
description: "E commerce project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  carousel_slider: ^4.2.1
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  http_parser: ^4.1.2
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10
  pinput: ^6.0.2
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^20.1.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo/NAGA.png
    - assets/images/logo/NAGA-title.png
    - assets/images/payment/
    - assets/images/khqr/Top.svg
    - assets/images/khqr/KHQR.svg
    - assets/images/khqr/Divider.svg
    - assets/images/khqr/Vector-1.svg
    - assets/images/khqr/KHQR_Logo.png
